name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv --python 3.12
          .venv\Scripts\Activate.ps1
          uv sync --all-extras --no-dev
          uv pip install pyinstaller
        shell: pwsh

      - name: Build executable with PyInstaller
        run: |
          .venv\Scripts\Activate.ps1
          pyinstaller --name browser-use --onefile --clean --noconfirm --collect-all browser_use --collect-all cdp_use --collect-all bubus --hidden-import=browser_use --hidden-import=browser_use.skill_cli.main --hidden-import=browser_use.cli --hidden-import=browser_use.agent.service --hidden-import=browser_use.agent.views --hidden-import=browser_use.browser --hidden-import=browser_use.browser.session --hidden-import=browser_use.browser.views --hidden-import=browser_use.tools.service --hidden-import=browser_use.dom.service --hidden-import=browser_use.llm.openai.chat --hidden-import=browser_use.llm.anthropic.chat --hidden-import=browser_use.llm.google.chat --hidden-import=browser_use.llm.browser_use.chat --hidden-import=browser_use.llm.groq.chat --hidden-import=browser_use.llm.ollama.chat --hidden-import=browser_use.llm.mistral.chat --hidden-import=browser_use.llm.azure.chat --hidden-import=browser_use.llm.litellm.chat --hidden-import=browser_use.llm.deepseek.chat --hidden-import=browser_use.llm.cerebras.chat --hidden-import=browser_use.llm.vercel.chat --hidden-import=browser_use.llm.openrouter.chat --hidden-import=browser_use.llm.oci_raw.chat --hidden-import=browser_use.llm.aws.chat_bedrock --hidden-import=browser_use.llm.aws.chat_anthropic --hidden-import=browser_use.mcp.server --hidden-import=browser_use.mcp.client --hidden-import=browser_use.mcp.controller --hidden-import=browser_use.sandbox.sandbox --hidden-import=browser_use.integrations.gmail.actions --hidden-import=browser_use.integrations.gmail.service --hidden-import=browser_use.filesystem.file_system --hidden-import=browser_use.skills.service --hidden-import=browser_use.telemetry.service --hidden-import=browser_use.tokens.service --hidden-import=browser_use.sync.service --hidden-import=browser_use.sync.auth --hidden-import=browser_use.logging_config --hidden-import=browser_use.config --hidden-import=browser_use.observability --hidden-import=browser_use.exceptions --hidden-import=browser_use.utils --hidden-import=browser_use.init_cmd --hidden-import=browser_use.actor.page --hidden-import=browser_use.actor.element --hidden-import=browser_use.actor.mouse --hidden-import=browser_use.actor.utils --hidden-import=browser_use.dom.serializer.serializer --hidden-import=browser_use.dom.serializer.html_serializer --hidden-import=browser_use.dom.serializer.clickable_elements --hidden-import=browser_use.dom.serializer.eval_serializer --hidden-import=browser_use.dom.serializer.paint_order --hidden-import=browser_use.dom.enhanced_snapshot --hidden-import=browser_use.dom.markdown_extractor --hidden-import=browser_use.dom.utils --hidden-import=browser_use.dom.views --hidden-import=browser_use.screenshots.service --hidden-import=browser_use.browser.cloud.cloud --hidden-import=browser_use.browser.profile --hidden-import=browser_use.browser.session_manager --hidden-import=browser_use.browser.video_recorder --hidden-import=browser_use.browser.demo_mode --hidden-import=browser_use.browser.python_highlights --hidden-import=browser_use.browser.events --hidden-import=browser_use.agent.message_manager.service --hidden-import=browser_use.agent.message_manager.utils --hidden-import=browser_use.agent.message_manager.views --hidden-import=browser_use.agent.gif --hidden-import=browser_use.agent.judge --hidden-import=browser_use.agent.prompts --hidden-import=browser_use.agent.variable_detector --hidden-import=browser_use.agent.cloud_events --hidden-import=browser_use.tools.extraction.schema_utils --hidden-import=browser_use.tools.extraction.views --hidden-import=browser_use.tools.registry.service --hidden-import=browser_use.tools.registry.views --hidden-import=browser_use.tools.utils --hidden-import=browser_use.tools.views --hidden-import=browser_use.browser.watchdogs.aboutblank_watchdog --hidden-import=browser_use.browser.watchdogs.captcha_watchdog --hidden-import=browser_use.browser.watchdogs.crash_watchdog --hidden-import=browser_use.browser.watchdogs.default_action_watchdog --hidden-import=browse