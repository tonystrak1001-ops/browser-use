  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-app-v0.12.9
          name: Browser-Use Desktop App v0.12.9
          body: |
            ## Browser-Use Desktop Application

            Standalone executable - no Python installation required!

            ### Downloads
            - **Windows**: `browser-use-windows/browser-use.exe`
            - **macOS**: `browser-use-macos/browser-use`
            - **Linux**: `browser-use-linux/browser-use`

            ### Usage
            1. Download the executable for your platform
            2. On macOS/Linux: `chmod +x browser-use && ./browser-use`
            3. On Windows: Double-click `browser-use.exe` or run from terminal
            4. First run will need to install Chromium: `browser-use install`

            ### Requirements
            - Internet connection (for LLM API calls)
            - An LLM API key (OpenAI, Anthropic, Google, or Browser-Use)
          files: |
            artifacts/browser-use-windows/*
            artifacts/browser-use-macos/*
            artifacts/browser-use-linux/*
