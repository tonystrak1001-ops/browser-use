name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv --python 3.12
          .venv\Scripts\Activate.ps1
          uv sync --all-extras --no-dev
          uv pip install pyinstaller
        shell: pwsh

      - name: Build executable with PyInstaller
        run: |
          .venv\Scripts\Activate.ps1
          pyinstaller browser-use.spec --clean --noconfirm
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-use-windows
          path: dist/browser-use.exe
          retention-days: 30

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv sync --all-extras --no-dev
          uv pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          source .venv/bin/activate
          pyinstaller browser-use.spec --clean --noconfirm

      - name: Make executable
        run: chmod +x dist/browser-use

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-use-macos
          path: dist/browser-use
          retention-days: 30

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libatspi2.0-0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Create venv and install dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv sync --all-extras --no-dev
          uv pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          source .venv/bin/activate
          pyinstaller browser-use.spec --clean --noconfirm

      - name: Make executable
        run: chmod +x dist/browser-use

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-use-linux
          path: dist/browser-use
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename files for clarity
        run: |
          mkdir -p release
          cp artifacts/browser-use-windows/browser-use.exe release/browser-use-windows.exe
          cp artifacts/browser-use-macos/browser-use release/browser-use-macos
          cp artifacts/browser-use-linux/browser-use release/browser-use-linux
          chmod +x release/browser-use-macos release/browser-use-linux

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-app-v0.12.9
          name: Browser-Use Desktop App v0.12.9
          body: |
            ## Browser-Use Desktop Application

            Standalone executable - no Python installation required!

            ### Downloads
            - **Windows**: `browser-use-windows.exe`
            - **macOS**: `browser-use-macos`
            - **Linux**: `browser-use-linux`

            ### Usage
            1. Download the executable for your platform
            2. On macOS/Linux: `chmod +x browser-use-macos && ./browser-use-macos`
            3. On Windows: Double-click `browser-use-windows.exe` or run from terminal
            4. First run will need to install Chromium: `browser-use install`

            ### Requirements
            - Internet connection (for LLM API calls)
            - An LLM API key (OpenAI, Anthropic, Google, or Browser-Use)
          files: |
            release/*
